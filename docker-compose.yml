version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: transitops-postgres
    restart: always
    environment:
      POSTGRES_USER: transitops
      POSTGRES_PASSWORD: transitops_dev_password
      POSTGRES_DB: transitops
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
